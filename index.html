<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OmniPOS v33 - Precision</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #000; --surface: #1c1c1e; --accent: #32d74b; --text: #fff; 
            --border: #38383a; --danger: #ff453a; --safe-bottom: env(safe-area-inset-bottom);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; touch-action: manipulation; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
        
        .header { padding: 50px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); }
        .nav-bar { height: 85px; background: var(--surface); display: flex; border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #8e8e93; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .nav-item i { font-size: 24px; margin-bottom: 4px; font-style: normal; }

        .view { display: none; flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 180px; -webkit-overflow-scrolling: touch; }
        .view.active { display: flex; flex-direction: column; }

        .p-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .p-card { background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; height: 130px; }
        .p-card img { width: 100%; height: 75px; object-fit: cover; background: #2c2c2e; }
        .p-info { padding: 5px; font-size: 10px; text-align: center; }
        .p-stock { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.8); color: var(--accent); font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

        .drawer { position: fixed; bottom: 85px; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; z-index: 900; transform: translateY(calc(100% - 65px)); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); border-top: 2px solid var(--border); }
        .drawer.open { transform: translateY(0); }
        .drawer-handle { height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-weight: 800; cursor: pointer; }

        .input-box { background: #2c2c2e; border: 1px solid var(--border); color: #fff; width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 10px; font-size: 16px; -webkit-appearance: none; outline: none; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 800; width: 100%; font-size: 16px; }
        .btn-ghost { background: #2c2c2e; color: #fff; border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; }

        #scanner-view { position:fixed; inset:0; background:#000; z-index:4000; display:none; flex-direction:column; }
        .scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border: 2px solid var(--accent); border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); pointer-events: none; }

        /* RECEIPT STYLING FOR EPSON THERMAL PRINTERS */
        #receipt-render { display: none; }
        @media print {
            body > *:not(#receipt-render) { display: none !important; }
            #receipt-render { 
                display: block !important; 
                width: 100% !important; 
                background: #fff !important; 
                color: #000 !important; 
                padding: 10px; 
                font-family: 'Courier New', Courier, monospace;
            }
            @page { margin: 0; size: 80mm auto; } /* Forces 80mm roll width */
            .r-table { width: 100%; border-collapse: collapse; }
            .r-table th { border-bottom: 1px solid #000; text-align: left; font-size: 10pt; }
            .r-table td { padding: 5px 0; border-bottom: 1px dotted #ccc; font-size: 11pt; }
            .r-total-row { font-size: 14pt; font-weight: bold; border-top: 2px solid #000; margin-top: 10px; padding-top: 5px; display: flex; justify-content: space-between; }
        }
    </style>
</head>
<body>

<div class="header">
    <h2 id="biz-title" style="margin:0; font-size: 20px; color: var(--accent);">OmniPOS</h2>
    <button id="nav-scan-btn" class="btn-ghost">📷 SCANNER</button>
</div>

<div class="view active" id="view-pos"><div class="p-grid" id="pos-grid"></div></div>

<div class="view" id="view-inv">
    <button id="add-prod-btn" class="btn-main" style="margin-bottom:15px;">+ NEW PRODUCT</button>
    <div id="inv-rows" style="display:flex; flex-direction:column; gap:10px;"></div>
</div>

<div class="view" id="view-logs">
    <div id="log-rows" style="display:flex; flex-direction:column; gap:10px;"></div>
</div>

<div class="view" id="view-cfg">
    <h3 style="color:var(--accent)">Store Branding</h3>
    <input type="text" id="cfg-name" placeholder="Company Name" class="input-box">
    <input type="text" id="cfg-sub" placeholder="Address/Contact/TIN" class="input-box">
    <input type="text" id="cfg-foot" placeholder="Footer Message" class="input-box">
    <button id="cfg-save" class="btn-main">SAVE SETTINGS</button>
</div>

<div class="drawer" id="cart-drawer">
    <div class="drawer-handle" id="drawer-toggle">
        <span>🛒 CART (<span id="cart-count">0</span>)</span>
        <span id="cart-total-top" style="color:var(--accent); font-size: 20px;">₱0.00</span>
    </div>
    <div style="padding:20px; height: 420px; display: flex; flex-direction: column;">
        <input type="text" id="cust-input" placeholder="Customer Name (Optional)" class="input-box">
        <div id="cart-items-list" style="flex:1; overflow-y:auto; margin-bottom:15px;"></div>
        <button id="btn-print-pay" class="btn-main">PRINT RECEIPT & COMPLETE</button>
        <button id="btn-void" style="color:var(--danger); border:none; background:none; padding:15px; width:100%; font-weight:bold;">CLEAR CART</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-pos"><i>🛒</i>POS</div>
    <div class="nav-item" id="nav-inv"><i>📦</i>STOCK</div>
    <div class="nav-item" id="nav-logs"><i>📜</i>HISTORY</div>
    <div class="nav-item" id="nav-cfg"><i>⚙️</i>SET</div>
</div>

<div id="modal-item" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:3000; display:none; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--surface); width:100%; border-radius:20px; padding:25px; border:1px solid var(--border);">
        <h3 style="margin-top:0; color:var(--accent);">Product Details</h3>
        <input type="text" id="m-name" placeholder="Name" class="input-box">
        <input type="number" id="m-price" placeholder="Price" class="input-box">
        <input type="number" id="m-stock" placeholder="Stock" class="input-box">
        <input type="text" id="m-code" placeholder="Barcode" class="input-box">
        <input type="file" id="m-img" accept="image/*" class="input-box" style="font-size:12px;">
        <button id="m-save" class="btn-main">SAVE</button>
        <button id="m-close" style="background:none; border:none; color:var(--danger); width:100%; padding:15px;">CANCEL</button>
    </div>
</div>

<div id="scanner-view">
    <div id="reader" style="flex:1;"></div>
    <button id="stop-scan-btn" class="btn-main" style="border-radius:0; background:var(--danger); color:#fff;">CANCEL SCAN</button>
</div>

<div id="receipt-render">
    <div style="text-align:center;">
        <h2 id="p-name" style="margin:0;"></h2>
        <p id="p-sub" style="margin:2px 0; font-size:9pt;"></p>
        <p>--------------------------------</p>
    </div>
    <div style="display:flex; justify-content:space-between; font-size:9pt;">
        <span>REF: #<span id="p-ref"></span></span>
        <span id="p-date"></span>
    </div>
    <div style="margin:5px 0; font-size:9pt;">CUST: <span id="p-cust"></span></div>
    <table class="r-table">
        <thead><tr><th>QTY</th><th>ITEM</th><th style="text-align:right;">PRICE</th></tr></thead>
        <tbody id="p-items"></tbody>
    </table>
    <div class="r-total-row"><span>TOTAL</span><span id="p-grand"></span></div>
    <div style="text-align:center; margin-top:30px;">
        <p id="p-foot" style="font-size:9pt;"></p>
        <p style="font-size:8pt; color:#666;">Generated by OmniPOS</p>
    </div>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('jmb_inv')) || [];
    let logs = JSON.parse(localStorage.getItem('jmb_logs')) || [];
    let config = JSON.parse(localStorage.getItem('jmb_cfg')) || { name: "JMB CRAFT", sub: "PH OPERATIONS", foot: "Thank you!", ref: 1001 };
    let cart = [];
    let scanner = null;

    function tap(id, fn) {
        const el = typeof id === 'string' ? document.getElementById(id) : id;
        if(el) el.addEventListener('click', (e) => { e.preventDefault(); fn(e); });
    }

    function sync() {
        localStorage.setItem('jmb_inv', JSON.stringify(inventory));
        localStorage.setItem('jmb_logs', JSON.stringify(logs));
        localStorage.setItem('jmb_cfg', JSON.stringify(config));
        renderPOS();
    }

    function renderPOS() {
        const grid = document.getElementById('pos-grid');
        grid.innerHTML = inventory.map((i, idx) => `
            <div class="p-card" data-idx="${idx}">
                <div class="p-stock">${i.stock}</div>
                <img src="${i.img || 'https://via.placeholder.com/150'}">
                <div class="p-info"><strong>${i.name}</strong><br>₱${parseFloat(i.price).toFixed(2)}</div>
            </div>
        `).join('');
        document.querySelectorAll('.p-card').forEach(c => tap(c, () => {
            const item = inventory[c.dataset.idx];
            if(item.stock <= 0) return alert("Out of Stock");
            const ex = cart.find(x => x.code === item.code);
            if(ex) ex.qty++; else cart.push({...item, qty:1});
            updateCart();
            if(window.navigator.vibrate) window.navigator.vibrate(40);
        }));
        document.getElementById('biz-title').innerText = config.name;
    }

    function updateCart() {
        let t = 0, q = 0;
        document.getElementById('cart-items-list').innerHTML = cart.map((i, idx) => {
            t += (i.price * i.qty); q += i.qty;
            return `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);">
                <div><strong>${i.name}</strong><br>₱${i.price} x ${i.qty}</div>
                <div class="c-del" data-idx="${idx}" style="color:var(--danger); font-weight:bold; padding:10px;">REMOVE</div>
            </div>`;
        }).join('');
        document.querySelectorAll('.c-del').forEach(b => tap(b, () => { cart.splice(b.dataset.idx, 1); updateCart(); }));
        document.getElementById('cart-total-top').innerText = "₱" + t.toLocaleString(undefined, {minimumFractionDigits:2});
        document.getElementById('cart-count').innerText = q;
    }

    tap('btn-print-pay', () => {
        if(cart.length === 0) return;
        
        // Update Stock
        cart.forEach(c => { const i = inventory.find(x => x.code === c.code); if(i) i.stock -= c.qty; });

        const total = document.getElementById('cart-total-top').innerText;
        const ref = config.ref++;
        const date = new Date().toLocaleString('en-PH');
        const cust = document.getElementById('cust-input').value || "Walk-In";
        
        logs.unshift({ id: ref, customer: cust, total: total, date: date, items: [...cart] });

        // Prepare Print Data
        document.getElementById('p-name').innerText = config.name;
        document.getElementById('p-sub').innerText = config.sub;
        document.getElementById('p-ref').innerText = ref;
        document.getElementById('p-date').innerText = date;
        document.getElementById('p-cust').innerText = cust;
        document.getElementById('p-grand').innerText = total;
        document.getElementById('p-foot').innerText = config.foot;
        document.getElementById('p-items').innerHTML = cart.map(i => `
            <tr><td>${i.qty}</td><td>${i.name}</td><td style="text-align:right;">₱${(i.qty * i.price).toFixed(2)}</td></tr>
        `).join('');

        sync();
        
        setTimeout(() => { 
            window.print(); 
            cart = []; document.getElementById('cust-input').value = ""; updateCart(); 
            document.getElementById('cart-drawer').classList.remove('open');
        }, 500);
    });

    tap('nav-pos', () => showView('pos')); tap('nav-inv', () => showView('inv')); tap('nav-logs', () => showView('logs')); tap('nav-cfg', () => showView('cfg'));
    tap('drawer-toggle', () => document.getElementById('cart-drawer').classList.toggle('open'));
    tap('add-prod-btn', () => document.getElementById('modal-item').style.display='flex');
    tap('m-close', () => document.getElementById('modal-item').style.display='none');
    tap('btn-void', () => { cart = []; updateCart(); });

    tap('m-save', () => {
        const file = document.getElementById('m-img').files[0];
        const item = {
            name: document.getElementById('m-name').value,
            price: parseFloat(document.getElementById('m-price').value) || 0,
            stock: parseInt(document.getElementById('m-stock').value) || 0,
            code: document.getElementById('m-code').value || Date.now().toString(),
            img: ''
        };
        if(file) {
            const r = new FileReader();
            r.onload = (e) => { item.img = e.target.result; inventory.push(item); sync(); document.getElementById('modal-item').style.display='none'; };
            r.readAsDataURL(file);
        } else { inventory.push(item); sync(); document.getElementById('modal-item').style.display='none'; }
    });

    tap('cfg-save', () => {
        config.name = document.getElementById('cfg-name').value;
        config.sub = document.getElementById('cfg-sub').value;
        config.foot = document.getElementById('cfg-foot').value;
        sync(); alert("Branding Updated!");
    });

    function showView(v) {
        document.querySelectorAll('.view, .nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
    }

    window.onload = () => {
        renderPOS();
        document.getElementById('cfg-name').value = config.name;
        document.getElementById('cfg-sub').value = config.sub;
        document.getElementById('cfg-foot').value = config.foot;
    };
</script>
</body>
</html>
